<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alertas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-container {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alertas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .alerta-card {
            border-left: 5px solid #e74c3c;
            background: #fff5f5;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .alerta-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.2);
        }

        .alerta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .alerta-titulo {
            font-weight: bold;
            color: #e74c3c;
            font-size: 16px;
        }

        .alerta-id {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .alerta-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
            color: #555;
        }

        .info-item {
            margin-bottom: 8px;
        }

        .info-label {
            font-weight: bold;
            color: #333;
            display: block;
        }

        .info-value {
            color: #666;
            margin-left: 5px;
        }

        .alerta-mensagem {
            background: white;
            border-left: 3px solid #f39c12;
            padding: 10px;
            margin-top: 10px;
            border-radius: 3px;
            font-style: italic;
            color: #555;
        }

        .vazio {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 16px;
        }

        .erro {
            background: #ffe0e0;
            color: #c0392b;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .token-input {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .token-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            text-align: center;
        }

        .token-section label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }

        .status-msg {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 Sistema de Alertas</h1>
        <p class="subtitle">Monitorização de Anomalias de Temperatura</p>

        <div class="token-section">
            <label for="tokenInput">Token JWT (necessário para aceder aos alertas):</label>
            <input type="text" id="tokenInput" class="token-input" placeholder="Cole aqui o seu token JWT">
            <small>Pode obter um token em: <code>/api/gerar-token</code></small>
        </div>

        <div class="btn-container">
            <button onclick="atualizarAlertas()">🔄 Atualizar Alertas</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Carregando alertas...</p>
        </div>

        <div class="status-msg" id="statusMsg"></div>
        <div class="erro" id="erro"></div>

        <div class="alertas-grid" id="alertasContainer">
            <p class="vazio">Clique em "Atualizar Alertas" para carregar os dados</p>
        </div>
    </div>

    <script>
        async function atualizarAlertas() {
            const token = document.getElementById('tokenInput').value;

            if (!token) {
                mostrarErro('Por favor, introduza um token JWT válido');
                return;
            }

            const loading = document.getElementById('loading');
            const container = document.getElementById('alertasContainer');
            const erroDiv = document.getElementById('erro');
            const statusMsg = document.getElementById('statusMsg');

            loading.style.display = 'block';
            erroDiv.style.display = 'none';
            statusMsg.style.display = 'none';

            try {
                const response = await fetch('/api/alertas', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                loading.style.display = 'none';

                if (!response.ok) {
                    if (response.status === 401) {
                        mostrarErro('Token inválido ou expirado. Por favor, gere um novo token.');
                    } else {
                        mostrarErro(`Erro ao carregar alertas: ${response.status}`);
                    }
                    return;
                }

                const alertas = await response.json();

                if (!Array.isArray(alertas) || alertas.length === 0) {
                    container.innerHTML = '<p class="vazio">✅ Nenhum alerta registado! Tudo está normal.</p>';
                    mostrarStatus('Alertas carregados com sucesso - Nenhuma anomalia detetada', 'success');
                    return;
                }

                container.innerHTML = '';
                alertas.forEach(alerta => {
                    const card = document.createElement('div');
                    card.className = 'alerta-card';
                    card.innerHTML = `
                        <div class="alerta-header">
                            <span class="alerta-titulo">Sensor: ${alerta.sensor}</span>
                            <span class="alerta-id">ID: ${alerta.id}</span>
                        </div>
                        <div class="alerta-info">
                            <div class="info-item">
                                <span class="info-label">Equipamento:</span>
                                <span class="info-value">${alerta.equipamento_id}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Leitura:</span>
                                <span class="info-value">${alerta.leitura}°C</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Data/Hora:</span>
                                <span class="info-value">${new Date(alerta.data).toLocaleString('pt-PT')}</span>
                            </div>
                        </div>
                        <div class="alerta-mensagem">
                            ⚠️ ${alerta.mensagem}
                        </div>
                    `;
                    container.appendChild(card);
                });

                mostrarStatus(`${alertas.length} alerta(s) carregado(s) com sucesso`, 'success');

            } catch (erro) {
                loading.style.display = 'none';
                console.error('Erro:', erro);
                mostrarErro(`Erro de ligação: ${erro.message}`);
            }
        }

        function mostrarErro(mensagem) {
            const erroDiv = document.getElementById('erro');
            const statusMsg = document.getElementById('statusMsg');
            erroDiv.textContent = mensagem;
            erroDiv.style.display = 'block';
            statusMsg.style.display = 'none';
        }

        function mostrarStatus(mensagem, tipo) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = mensagem;
            statusMsg.className = 'status-msg status-' + tipo;
            statusMsg.style.display = 'block';
        }

        window.addEventListener('load', () => {
            document.getElementById('tokenInput').focus();
        });
    </script>
</body>
</html>
